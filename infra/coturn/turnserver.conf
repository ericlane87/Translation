listening-port=3478
tls-listening-port=5349

# Replace with your server public IP or DNS name.
external-ip=YOUR_PUBLIC_IP
realm=YOUR_TURN_HOST_OR_IP

# coturn REST auth mode (matches server.mjs TURN credential generation).
use-auth-secret
static-auth-secret=j6+NXxIFGjzXFclS8agRWnqvfKYAQpkNXqt4YoHZqjNUMEqvVWs2QLxbUZ3BC0IB

# Keep relay-only behavior and disable legacy auth methods.
fingerprint
lt-cred-mech
no-multicast-peers
stale-nonce
no-cli
no-tlsv1
no-tlsv1_1

# Recommended network controls.
min-port=49160
max-port=49250

# Optional but useful logs.
simple-log
log-file=/var/tmp/turn.log
